services:
  voice:
    build:
      context: ./voice
      dockerfile: Dockerfile
    container_name: even-g2-voice
    ports:
      - "8081:8081"
    environment:
      - WHISPER_MODEL=large-v3-turbo
      - WHISPER_DEVICE=auto
      - WHISPER_COMPUTE_TYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

  openclaw:
    image: even-g2-openclaw:latest
    container_name: even-g2-openclaw
    ports:
      - "18789:18789"
      - "18790:18790"
      - "1455:1455"   # OAuth callback for auth setup
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_BIND=lan
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ./openclaw/SOUL.md:/home/node/.openclaw/workspace/SOUL.md:ro
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  model-cache:
